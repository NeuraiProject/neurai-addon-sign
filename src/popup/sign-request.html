<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neurai Sign - Signature Request</title>
  <link rel="icon" type="image/png" sizes="128x128" href="../icons/icon128.png">
  <link rel="stylesheet" href="sign-request.css">
</head>
<body>
  <main class="panel">
    <header class="head">
      <div class="head-title">
        <span id="signTypeIcon" class="sign-type-icon"></span>
        <h1 id="pageTitle">Signature Request</h1>
      </div>
      <span id="signTypeBadge" class="sign-badge hidden"></span>
      <p>Approve or reject this signing operation.</p>
    </header>

    <section class="card">
      <div class="row">
        <span>Type</span>
        <strong id="signTypeValue">--</strong>
      </div>
      <div class="row">
        <span>Site</span>
        <strong id="originValue">--</strong>
      </div>
      <div class="row">
        <span>Address</span>
        <strong id="addressValue">--</strong>
      </div>
      <div class="row">
        <span>Network</span>
        <strong id="networkValue">--</strong>
      </div>
      <div class="row hidden" id="sighashRow">
        <span>Sighash type</span>
        <strong id="sighashValue">--</strong>
      </div>
      <div class="row hidden" id="inputsRow">
        <span>Inputs to sign</span>
        <strong id="inputsValue">--</strong>
      </div>
    </section>

    <section class="card">
      <h2 id="messageCardTitle">Message</h2>
      <pre id="messageValue">--</pre>
    </section>

    <section class="card hidden" id="txDetailsBlock">
      <button class="tx-expand-btn" id="txExpandBtn" type="button">
        <svg id="txExpandChevron" width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M6 8.5L1.5 4h9L6 8.5z"/></svg>
        Show transaction details
      </button>
      <div class="tx-details hidden" id="txDetails">
        <div class="tx-details-section">
          <div class="tx-details-label">Raw transaction hex</div>
          <pre class="tx-hex" id="txHexValue"></pre>
        </div>
        <div class="tx-details-section hidden" id="utxosSection">
          <div class="tx-details-label">Inputs (UTXOs)</div>
          <div id="utxosList"></div>
        </div>
      </div>
    </section>

    <section class="card hidden" id="pinBlock">
      <label for="pinInput">Access PIN</label>
      <input id="pinInput" type="password" placeholder="Enter PIN to approve" autocomplete="off">
      <p class="error" id="errorText"></p>
    </section>

    <div class="actions">
      <button id="rejectBtn" class="btn btn-secondary" type="button">Reject</button>
      <button id="acceptBtn" class="btn btn-primary" type="button">Accept</button>
    </div>
  </main>

  <script type="module" src="sign-request.js"></script>
</body>
</html>
